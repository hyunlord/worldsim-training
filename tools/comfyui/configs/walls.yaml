# Round 2 wall material prompt catalog — 7 materials × 3 variants = 21 PNGs
# Each material generates 1024×1024 via SDXL + Pixel Art XL LoRA.
# auto_process --tile-mode downscales to 16×16 RGB (no alpha, no outline).
#
# Seeds: 162-168 (away from buildings seed range 142-151).

version: 1

global:
  style_prefix: >
    seamless tileable pixel art wall texture, top-down overhead view,
    flat uniform surface filling entire frame, 16-color earthy stone-age palette,
    pixel-perfect crisp edges, no anti-aliasing, no dithering

  negative_prompt: >
    outline, border, frame, vignette, edge shadow, border shading,
    transparent background, alpha channel, transparency, cutout,
    3D perspective, isometric, side view, dramatic shadow,
    single rock, single plank, isolated object,
    object on background, diorama, pedestal,
    scene, landscape, sky, mountain, horizon, environment,
    anti-aliased, blurry, gradient, soft edges,
    multiple objects, sprite sheet, icon grid,
    black border, dark edges, shaded corners

