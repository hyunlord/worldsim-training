# Stone-Age building concept prompt catalog — FINAL (v3 full regen)
# Generated 2026-04-18. batch_size 16 per building for richer variant pool.
#
# Prompt strategy:
#   - 8 buildings (campfire/shelter/stockpile/hearth/storage_pit/
#     gathering_marker/totem/cairn): v2 prompts promoted as-is. v2 hit rate was ≥60%.
#   - 2 buildings (drying_rack, workbench): v3 prompts — targeted rewrites for
#     the specific failure mode each one showed in v2.
#
# Seeds unchanged from v2 (142-151). Running full batch (no --only) against
# `--output-root concepts_v3` produces 10 × 16 = 160 PNGs.
# concepts_v2/ is preserved as rollback fallback.

version: 1

global:
  # Same as v2 — negative was thorough, no regressions observed
  negative_prompt: >
    multiple objects, scene with several items, sprite sheet, icon grid,
    tileable texture, repeating pattern, ground tile, floor tile, fence, wall,
    courtyard, yard, building interior, map view, RPG asset pack,
    photo-realistic, 3d render, anti-aliasing, smooth gradients,
    text, watermark, signature, modern objects, metal, plastic,
    blurry, low quality, side view elevation, architectural blueprint

  # Same as v2 — this was the key to v2 success; do not regress
  style_prefix: >
    SINGLE isolated stone-age object, centered composition, object fills 70% of frame,
    empty bare dirt background, no surrounding props, no fences or walls,
    orthographic 3/4 view with slight overhead angle, pixel art, crisp pixels,
    16-color earthy palette, primitive prehistoric era, clear silhouette,
    rendered as a standalone game sprite

buildings:
  # ─── 8 buildings promoted from v2 unchanged ──────────────────────────
  campfire:
    positive: >
      one small circular fire pit, ring of grey stones around glowing orange flames,
      thin smoke wisp rising, ash under the fire, nothing else in view
    seed: 142
    batch_size: 16
    notes: "v2 결과 유지 (7/8 성공). 단일 모닥불 + 최소 배경."

  shelter:
    positive: >
      one primitive A-frame lean-to hut, wooden branch walls, leaf thatch roof,
      single small dark doorway facing camera, no doors, weathered brown wood,
      compact hut proportions, roughly as wide as tall, isolated on bare dirt
    seed: 143
    batch_size: 16
    notes: "v2 결과 유지 (6/8 성공). 3/4 각도 + 정면 doorway로 측면뷰 문제 해결."

  stockpile:
    positive: >
      one small compact pile of 5 to 7 wood logs loosely stacked with a few grey stones,
      knee-high heap, messy but discrete, occupies only the center of the frame,
      nothing else stored around it, no containers no baskets
    seed: 144
    batch_size: 16
    notes: "v2 결과 유지 (3/8 성공, 일부 통나무 그릇 해석 있지만 사용 가능 변종 존재)."

  hearth:
    positive: >
      one large circular hearth made of stacked grey stones forming a waist-high ring,
      contained cooking fire with orange flames inside, ash bed at the bottom,
      single simple wooden spit resting across the top, more substantial than a campfire,
      nothing else around
    seed: 146
    batch_size: 16
    notes: "v2 결과 유지 (7/8 성공). v1의 잡동사니 배경 제거됨."

  storage_pit:
    positive: >
      one round shallow pit dug into dirt ground, low mound of dirt around the rim,
      woven grass cover half pulled aside revealing dark opening inside,
      single pit only, nothing stored around it, clear dark entrance visible
    seed: 148
    batch_size: 16
    notes: "v2 결과 유지 (6/8 성공). 단일 구덩이 오브젝트로 '장면' 문제 해결."

  gathering_marker:
    positive: >
      one simple circle of 7 rounded stones arranged on bare dirt,
      one flat ceremonial stone at the center of the ring, stones are knee-high,
      compact ritual site, nothing else in frame, no carvings no symbols
    seed: 149
    batch_size: 16
    notes: "v2 결과 유지 (8/8 완벽). 'no carvings no symbols'로 스프라이트 시트 차단 성공."

  totem:
    positive: >
      one tall vertical wooden totem pole planted upright in dirt ground,
      single carved post about three times as tall as wide, simple weathered
      animal face carvings stacked along the pole, one bone and feather decoration
      near the top, nothing else in the scene
    seed: 150
    batch_size: 16
    notes: "v2 결과 유지 (8/8 성공). SDXL이 'wooden'을 'stone moai'로 해석했지만 결과 훌륭. wooden 유지 선택 — 만약 stone 명시하면 해석 붕괴 위험."

  cairn:
    positive: >
      one conical cairn of 5 stacked rounded stones, tallest in the middle,
      narrowing toward the top, stones are grey with small patches of green moss
      on the lowest ones, compact monument on flat bare dirt, nothing else visible
    seed: 151
    batch_size: 16
    notes: "v2 결과 유지 (7/8 성공). 'compact' + 숫자 명시로 타일 텍스처 차단."

  # ─── 2 buildings rewritten as v3 — targeted fixes ────────────────────
  drying_rack:
    # v2 failure mode: wooden frame generated correctly, but hide strips missing.
    # SDXL gave focus to "primitive wooden frame" keywords and dropped "hide strips".
    # v3 fix: make hide strips the VISUAL FOCUS, reduce frame description weight.
    positive: >
      THREE large dark brown strips of animal hide prominently HANGING VERTICALLY
      from a simple wooden crossbeam, hide strips are the main visual subject and
      fill most of the frame, two short vertical posts hold up one horizontal beam,
      primitive fiber lashings visible at joints, hide strips dominate the composition,
      stone-age prehistoric food preservation rack, standing on empty dirt ground
    seed: 147
    batch_size: 16
    notes: "v3 재설계. v2는 프레임만 그리고 가죽 스트립 누락. 'THREE large' + 'HANGING VERTICALLY' + 'main visual subject' + 'fill most of the frame'로 가죽에 어텐션 강제."

  workbench:
    # v2 failure mode: "flat stone slab on log supports" rendered as monolithic
    # rock / stone bowl / tall stone block — the TABLE concept was missing entirely.
    # v3 fix: lead with "TABLE" as the primary noun, explicitly describe legs
    #         and empty space beneath the tabletop. Add "workshop" context for
    #         semantic grounding.
    positive: >
      one primitive stone-age WORKBENCH TABLE with visible open space underneath,
      flat rectangular stone top supported by FOUR short wooden log legs clearly
      visible beneath the tabletop, table is knee-high, few flint chips and bone
      tools resting on the flat tabletop surface, clearly a table or workshop bench
      not a solid rock, legs and tabletop distinctly separated
    seed: 145
    batch_size: 16
    notes: "v3 재설계. v2는 'flat stone slab'을 단일 돌덩어리로 해석. 'TABLE' 주명사화 + 'FOUR legs visible' + 'open space underneath' + 'not a solid rock'로 테이블 개념 강제 주입."
